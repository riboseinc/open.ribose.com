# AsciiDoc
# https://github.com/asciidoctor/jekyll-asciidoc#configuration
#
asciidoc:
  processor: asciidoctor
  ext: asciidoc,adoc,ad
  # page_attribute_prefix: jekyll
  require_front_matter_header: true

asciidoctor: {}

is_hub: true

permalink: /blog/:month-:day-:year/:title/

theme: jekyll-theme-rop

url: https://www.ribose.com

emails:
  press: press@ribose.com
  privacy: privacy@ribose.com
  support: support@ribose.com
  security: security.reports@ribose.com

algolia_search:
  api_key: '40a5c3929d2f6d51c9a062d2bdf00c20'
  index_name: 'prod_riboseopen'

tag_namespaces:
  software:
    writtenin: "Written in"
    bindingsfor: "Bindings for"
    user: "Target user"
    interface: "Interface"
  specs:
    audience: "Audience"
    completion_status: "Status"

# This has to be duplicated from jekyll-theme-rop gem.
includes_dir: .

collections:
  projects:
    output: true
    permalink: /projects/:path/
  software:
    output: true
    permalink: /software/:path/
  specs:
    output: true
    permalink: /specs/:path/
  posts:
    output: true
    permalink: /blog/:month-:day-:year/:title/
  pages:
    output: true
    permalink: /:name/
  advisories:
    output: true
    permalink: /advisories/:slug/

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
exclude:
  - _projects/**/assets/css/*.scss
  - _projects/**/_software/_*_repo/*
  - _projects/**/_specs/**/*
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - Makefile
  - Rakefile
  - README.adoc
  - babel.config.js
  - package.json
  - package-lock.json

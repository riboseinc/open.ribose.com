  for&nbsp;all

description: >-
  Collaborative technologies for all

seo:
  type: Organization

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-polyglot

# Multilingual support (jekyll-polyglot)
languages: ["en", "fr", "ja", "zh-hant", "zh-hans"]
default_lang: "en"
lang_from_path: true
exclude_from_localization: ["javascript", "images", "css", "assets", "cves"]
parallel_localization: true

# Language display labels for language switcher

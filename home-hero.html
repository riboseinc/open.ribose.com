{% assign t = site.t[site.active_lang] | default: site.t.en %}
<div class="text">
  <h1 class="title">{{ t.hero_tagline | default: site.tagline | safe }}</h1>

  <div class="cta explore-projects" role="presentation">
    <a class="button" href="{{ "/projects/" | relative_url }}">
      <i class="icon fas fa-search"></i>
      {{ t.explore_projects | default: "Explore Projects" }}
    </a>
  </div>
</div>
